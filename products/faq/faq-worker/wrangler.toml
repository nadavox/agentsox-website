name = "agentsox-faq-worker"
main = "src/index.ts"
compatibility_date = "2026-05-23"

# CORS origins are NOT configured here. The allowlist is derived from the client
# registry (src/clients) - each client config lists its own origins. ENVIRONMENT
# only gates whether localhost dev origins are accepted (see src/lib/cors.ts).

# The embeddable widget bundle (built from products/faq/widget). Static assets are served
# for matching paths (e.g. /widget.js); every other path runs the Worker script
# (/api/*, /c/*). Build it before dev/deploy (see package.json predev/predeploy).
[assets]
directory = "./assets"

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true

[env.local]
name = "agentsox-faq-worker-local"

[env.local.vars]
ENVIRONMENT = "local"

[env.remote]
name = "agentsox-faq-worker-remote"

[env.remote.vars]
ENVIRONMENT = "development"

[[env.remote.ratelimits]]
name = "API_RATE_LIMITER"
namespace_id = "1003"

  [env.remote.ratelimits.simple]
  limit = 30
  period = 60

[env.production]
name = "agentsox-faq-worker"
routes = [
  { pattern = "faq.agentsox.com", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.ratelimits]]
name = "API_RATE_LIMITER"
namespace_id = "1004"

  [env.production.ratelimits.simple]
  limit = 30
  period = 60

# Quota guardrails (src/lib/quota.ts) - per-visitor + per-client turn caps. ONE-TIME
# setup, then every client gets quotas free via config. Quotas are OFF until bound.
# To enable: `npx wrangler kv namespace create FAQ_QUOTA_KV`, then uncomment and paste
# the printed id. The worker deploys fine while this stays commented.
# [[env.production.kv_namespaces]]
# binding = "FAQ_QUOTA_KV"
# id = "<paste-kv-namespace-id>"
