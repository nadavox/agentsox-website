<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- OX Logo scaled up and centered -->
  <g transform="translate(460, 140)">
    <!-- O: geometric circle with gap -->
    <circle cx="60" cy="80" r="55" fill="none" stroke="url(#logoG)" stroke-width="18" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="50"/>
    <!-- X: dynamic angled strokes -->
    <line x1="145" y1="25" x2="260" y2="155" stroke="url(#logoG)" stroke-width="18" stroke-linecap="round"/>
    <line x1="260" y1="25" x2="145" y2="155" stroke="url(#logoG)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <!-- Company name: "Agents" in white, "OX" in blue — rendered as paths -->
  <!-- A -->
  <path d="M330 470l18-50h4l18 50h-8l-4-12h-16l-4 12h-8zm13-18h10l-5-15-5 15z" fill="#EEEEF0"/>
  <!-- g -->
  <path d="M378 440c0-7 5-12 11-12s11 5 11 12v2c0 7-5 12-11 12-3 0-6-1-8-3v10h-6v-33h6v3c2-2 5-3 8-3zm3 2c0 4 3 7 7 7s7-3 7-7-3-7-7-7-7 3-7 7z" fill="#EEEEF0"/>
  <!-- e -->
  <path d="M408 440c0-7 5-12 11-12s11 5 11 11v2h-16c1 3 3 5 7 5 2 0 4-1 5-2l4 3c-2 3-6 5-10 5-7 0-12-5-12-12zm6-2h10c-1-3-3-5-5-5s-4 2-5 5z" fill="#EEEEF0"/>
  <!-- n -->
  <path d="M437 429h6v4c2-3 5-4 8-4 6 0 9 4 9 10v13h-6v-12c0-4-2-6-5-6s-6 2-6 6v12h-6v-23z" fill="#EEEEF0"/>
  <!-- t -->
  <path d="M468 435v-6h4v-8h6v8h6v6h-6v10c0 2 1 3 3 3h3v6h-4c-5 0-8-3-8-8v-11h-4z" fill="#EEEEF0"/>
  <!-- s -->
  <path d="M491 445c0-5 4-8 10-8 3 0 5 1 7 2v-1c0-3-2-5-6-5-2 0-5 1-7 2l-2-5c3-2 7-3 10-3 8 0 11 4 11 11v14h-6v-3c-2 2-4 3-7 3-6 0-10-3-10-7zm11 2c3 0 6-2 6-4v-2c-1-1-3-2-5-2-3 0-5 2-5 4s2 4 4 4z" fill="#EEEEF0"/>
  <!-- O (blue) -->
  <path d="M530 455c-8 0-14-10-14-20s6-20 14-20 14 10 14 20-6 20-14 20zm0-7c4 0 7-6 7-13s-3-13-7-13-7 6-7 13 3 13 7 13z" fill="#3B82F6"/>
  <!-- X (blue) -->
  <path d="M550 416h8l8 14 8-14h8l-12 19 12 19h-8l-8-14-8 14h-8l12-19-12-19z" fill="#3B82F6"/>
  <!-- Tagline: "AI Agents That Run Your Business" -->
  <!-- Simplified tagline as a subtle line + dots pattern instead of text -->
  <rect x="350" y="490" width="500" height="1" rx="0.5" fill="#A0A0B0" opacity="0.3"/>
  <!-- Three dots representing the tagline abstractly -->
  <circle cx="550" cy="510" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="600" cy="510" r="3" fill="#3B82F6" opacity="0.6"/>
  <circle cx="650" cy="510" r="3" fill="#3B82F6" opacity="0.4"/>
</svg>
