# Assets-only Worker for the AgentsOX marketing site (sites/agentsox/web).
# No `main` script — this Worker serves the prerendered Vite build in ./dist.
# Top-level config (no [env.*]) so a plain `wrangler deploy` from this dir is correct.
name = "agentsox-web"
compatibility_date = "2026-05-23"

[assets]
directory = "./dist"
# Unknown paths fall back to the root index.html for client-side routing.
# Prerendered routes (e.g. /ai-chatbots/index.html) still resolve to their own file.
not_found_handling = "single-page-application"
# Serve prerendered routes at their canonical no-trailing-slash URL (e.g. /ai-chatbots),
# matching the <link rel="canonical"> tags and sitemap.xml. The default
# "auto-trailing-slash" would 307-redirect /ai-chatbots -> /ai-chatbots/, which Vercel did not.
html_handling = "drop-trailing-slash"

# Apex custom domain — attached at cutover on 2026-05-29; agentsox.com is served by this Worker.
# (The prior apex CNAME → cname.vercel-dns.com was removed first; A/CNAME can't coexist with the
# Worker's record on one name.) www.agentsox.com 301-redirects here via a Cloudflare Redirect Rule.
[[routes]]
pattern = "agentsox.com"
custom_domain = true
