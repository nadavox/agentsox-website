name = "agentsox-mail-worker"
main = "src/index.ts"
compatibility_date = "2026-05-23"

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true

[env.local]
name = "agentsox-mail-worker-local"

[env.local.vars]
SITE_ID = "agentsox-main"
ALLOWED_ORIGINS = "http://localhost:5174,http://127.0.0.1:5174"
CONTACT_TO_EMAIL = "nadav@agentsox.com"
CONTACT_FROM_EMAIL = "nadav@agentsox.com"
CONTACT_FROM_NAME = "AgentsOX Website"

[env.production]
name = "agentsox-mail-worker"
routes = [
  { pattern = "contact.agentsox.com", custom_domain = true }
]

[env.production.vars]
SITE_ID = "agentsox-main"
ALLOWED_ORIGINS = "https://agentsox.com,https://www.agentsox.com"
CONTACT_TO_EMAIL = "nadav@agentsox.com"
CONTACT_FROM_EMAIL = "nadav@agentsox.com"
CONTACT_FROM_NAME = "AgentsOX Website"

[[env.production.ratelimits]]
name = "API_RATE_LIMITER"
namespace_id = "1003"

  [env.production.ratelimits.simple]
  limit = 30
  period = 60
